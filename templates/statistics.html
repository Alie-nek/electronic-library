{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">📊 Статистика</h1>

<ul class="nav nav-tabs mb-4" id="statsTab" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="actions-tab" data-bs-toggle="tab" data-bs-target="#actions" type="button" role="tab">Журнал действий пользователей</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="books-tab" data-bs-toggle="tab" data-bs-target="#books" type="button" role="tab">Статистика просмотра книг</button>
    </li>
</ul>

<div class="tab-content" id="statsTabContent">
    
    <div class="tab-pane fade show active" id="actions" role="tabpanel">
        <div class="mb-3">
            <a href="{{ url_for('export_csv', entity='user_actions') }}" class="btn btn-success">📥 Экспорт в CSV</a>
        </div>
        <div class="table-responsive">
            <table class="table table-striped" id="actionsTable">
                <thead>
                    <tr><th>№</th><th>ФИО пользователя</th><th>Название книги</th><th>Дата и время</th></tr>
                </thead>
                <tbody id="actionsBody"></tbody>
            </table>
        </div>
        <nav><ul class="pagination justify-content-center" id="actionsPagination"></ul></nav>
    </div>
    
    <div class="tab-pane fade" id="books" role="tabpanel">
        <div class="mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-auto">
                    <label class="form-label">Дата от</label>
                    <input type="date" id="dateFrom" class="form-control">
                </div>
                <div class="col-auto">
                    <label class="form-label">Дата до</label>
                    <input type="date" id="dateTo" class="form-control">
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary" id="applyFilter">Применить</button>
                </div>
                <div class="col-auto">
                    <a href="#" id="exportBooksBtn" class="btn btn-success">📥 Экспорт в CSV</a>
                </div>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-striped" id="booksTable">
                <thead><tr><th>№</th><th>Название книги</th><th>Количество просмотров</th></tr></thead>
                <tbody id="booksBody"></tbody>
            </table>
        </div>
        <nav><ul class="pagination justify-content-center" id="booksPagination"></ul></nav>
    </div>
</div>

<script>
let actionsPage = 1, booksPage = 1, dateFrom = '', dateTo = '';

function loadActions() {
    fetch(`/api/user-actions-log?page=${actionsPage}`)
        .then(r => r.json())
        .then(data => {
            let html = '';
            data.data.forEach((row, idx) => {
                html += `<tr>
                    <td>${(data.page-1)*data.per_page + idx + 1}</td>
                    <td>${row.user_fullname}</td>
                    <td>${row.book_title}</td>
                    <td>${row.view_date}</td>
                </tr>`;
            });
            document.getElementById('actionsBody').innerHTML = html;
            let pages = Math.ceil(data.total / data.per_page);
            let pagHtml = '';
            for (let i = 1; i <= pages; i++) {
                pagHtml += `<li class="page-item ${i === data.page ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="setActionsPage(${i}); return false;">${i}</a>
                </li>`;
            }
            document.getElementById('actionsPagination').innerHTML = pagHtml;
        });
}

function loadBooks() {
    let url = `/api/book-stats?page=${booksPage}`;
    if (dateFrom) url += `&date_from=${dateFrom}`;
    if (dateTo) url += `&date_to=${dateTo}`;
    fetch(url).then(r => r.json()).then(data => {
        let html = '';
        data.data.forEach((row, idx) => {
            html += `<tr>
                <td>${(data.page-1)*data.per_page + idx + 1}</td>
                <td><a href="/book/${row.id}">${row.title}</a></td>
                <td>${row.views_count}</td>
            </tr>`;
        });
        document.getElementById('booksBody').innerHTML = html;
        let pages = Math.ceil(data.total / data.per_page);
        let pagHtml = '';
        for (let i = 1; i <= pages; i++) {
            pagHtml += `<li class="page-item ${i === data.page ? 'active' : ''}">
                <a class="page-link" href="#" onclick="setBooksPage(${i}); return false;">${i}</a>
            </li>`;
        }
        document.getElementById('booksPagination').innerHTML = pagHtml;
    });
}

function setActionsPage(p) { actionsPage = p; loadActions(); }
function setBooksPage(p) { booksPage = p; loadBooks(); }

document.getElementById('applyFilter')?.addEventListener('click', () => {
    dateFrom = document.getElementById('dateFrom').value;
    dateTo = document.getElementById('dateTo').value;
    booksPage = 1;
    loadBooks();
});

document.getElementById('exportBooksBtn')?.addEventListener('click', (e) => {
    e.preventDefault();
    let url = '/export/csv/book_stats';
    let params = [];
    if (dateFrom) params.push(`date_from=${dateFrom}`);
    if (dateTo) params.push(`date_to=${dateTo}`);
    if (params.length) url += '?' + params.join('&');
    window.location.href = url;
});

loadActions();
loadBooks();
</script>
{% endblock %}
